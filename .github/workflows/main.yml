name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_contracts:
    name: Build Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: wasm32-unknown-unknown
          
      - name: Install Nightly for build-std (Optional)
        run: rustup toolchain install nightly && rustup component add rust-src --toolchain nightly

      - name: Build NFT Contract
        working-directory: contracts/nft_contract
        run: cargo build --release --target wasm32-unknown-unknown
        
      - name: Build Metadata Contract
        working-directory: contracts/metadata_contract
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Build Fungible Contract (VIBE)
        working-directory: contracts/fungible_contract
        run: cargo build --release --target wasm32-unknown-unknown

  build_frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: Frontend Install and Build
        working-directory: frontend
        run: |
          npm install
          npm run build
