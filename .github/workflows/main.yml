name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  contract_tests:
    name: Rust Contract Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Build NFT Contract
        run: |
          cd contracts/nft_contract
          cargo build --release

      - name: Run NFT Contract Tests
        run: |
          cd contracts/nft_contract
          cargo test --target x86_64-unknown-linux-gnu

      - name: Build Metadata Contract
        run: |
          cd contracts/metadata_contract
          cargo build --release

      - name: Run Metadata Contract Tests
        run: |
          cd contracts/metadata_contract
          cargo test --target x86_64-unknown-linux-gnu

      - name: Build Token Contract
        run: |
          cd contracts/fungible_contract
          cargo build --release

      - name: Run Token Contract Tests
        run: |
          cd contracts/fungible_contract
          cargo test --target x86_64-unknown-linux-gnu

  frontend_tests:
    name: Frontend Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Run Frontend Tests
        run: |
          cd frontend
          npm run test -- --run

      - name: Build Frontend
        run: |
          cd frontend
          npm run build
