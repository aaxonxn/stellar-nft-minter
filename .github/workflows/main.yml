name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Build NFT Contract
        run: |
          cd contracts/nft_contract
          cargo build --release

      - name: Build Metadata Contract
        run: |
          cd contracts/metadata_contract
          cargo build --release

      - name: Build Token Contract
        run: |
          cd contracts/fungible_contract
          cargo build --release
